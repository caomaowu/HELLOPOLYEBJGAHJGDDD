# 应用配置
spring.application.name=polyhermes-backend

# 数据源配置（默认配置，可通过环境变量覆盖）
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/polyhermes?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:helloworld}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池配置
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA 配置
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway 配置
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# 服务器配置
server.port=${SERVER_PORT:8000}

# Spring Profile 配置
# 默认使用 dev 环境，可通过 --spring.profiles.active=prod 切换
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# 日志配置（支持通过环境变量配置）
logging.level.root=${LOG_LEVEL_ROOT:WARN}
logging.level.com.wrbug.polymarketbot=${LOG_LEVEL_APP:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Polymarket API 配置
# 注意：Polymarket API URL 现在使用代码常量（PolymarketConstants），不再从配置文件读取
# 如需修改，请修改 com.wrbug.polymarketbot.constants.PolymarketConstants 类

# Builder Relayer 配置（用于 Gasless 交易）
# 从 polymarket.com/settings?tab=builder 获取 Builder API 凭证
# Builder API Key、Secret、Passphrase 现在通过系统设置页面配置，存储在数据库中
# 如果未配置，将使用手动发送交易的方式（需要用户支付 gas）
# 注意：Builder Relayer URL 现在使用代码常量（PolymarketConstants.BUILDER_RELAYER_URL），不再从配置文件读取

# 跟单轮询配置
# 轮询间隔（毫秒），默认2秒
copy.trading.polling.interval=${COPY_TRADING_POLLING_INTERVAL:2000}
# 是否启用轮询，默认true
copy.trading.polling.enabled=${COPY_TRADING_POLLING_ENABLED:true}

# 跟单监听配置
# 链上 WebSocket 重连延迟（毫秒），默认3秒
copy.trading.onchain.ws.reconnect.delay=${COPY_TRADING_ONCHAIN_WS_RECONNECT_DELAY:3000}

# WebSocket 配置
websocket.heartbeat-timeout=${WEBSOCKET_HEARTBEAT_TIMEOUT:60000}

# 数据保留策略（防止事件表无限增长）
# 每天 03:20 执行清理（秒 分 时 日 月 周）
data.retention.cleanup.cron=${DATA_RETENTION_CLEANUP_CRON:0 20 3 * * *}
# 支持小数天（例如 0.4 表示约 9.6 小时）
data.retention.copy-trading-execution-event.days=${DATA_RETENTION_COPY_TRADING_EXECUTION_EVENT_DAYS:7}
data.retention.backtest-audit-event.days=${DATA_RETENTION_BACKTEST_AUDIT_EVENT_DAYS:14}
data.retention.trader-activity-event-history.days=${DATA_RETENTION_TRADER_ACTIVITY_EVENT_HISTORY_DAYS:3}
data.retention.trader-market-activity-pool.days=${DATA_RETENTION_TRADER_MARKET_ACTIVITY_POOL_DAYS:7}

# Trader activity 历史是否持久化原始 payload（LONGTEXT）
# 默认关闭，避免磁盘暴涨
copy.trading.discovery.activity-history.store-raw-payload=${COPY_TRADING_DISCOVERY_ACTIVITY_HISTORY_STORE_RAW_PAYLOAD:false}
# 是否启用全量实时 discovery 入库（会显著增加 MySQL 写入）
# 默认关闭；关闭时仅对命中监听 Leader 的事件做必要沉淀
copy.trading.discovery.realtime.enabled=${COPY_TRADING_DISCOVERY_REALTIME_ENABLED:false}

# JWT配置
jwt.secret=${JWT_SECRET:change-me-in-production-use-openssl-rand-hex-64}
# 7天（毫秒）
jwt.expiration=604800000
# 1天（毫秒），超过此时间但未过期时自动刷新
jwt.refresh-threshold=86400000

# 加密配置（用于加密私钥等敏感数据）
# 如果不设置，默认使用 jwt.secret
encryption.key=${ENCRYPTION_KEY:${jwt.secret}}

# 密码重置配置
admin.reset-password.key=${ADMIN_RESET_PASSWORD_KEY:change-me-in-production-use-openssl-rand-hex-32}

# 频率限制配置
# 1分钟内最多3次
rate-limit.reset-password.max-attempts=3
# 时间窗口（秒）
rate-limit.reset-password.window-seconds=60
