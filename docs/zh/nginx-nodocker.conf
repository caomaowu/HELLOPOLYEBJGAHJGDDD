# PolyHermes 非 Docker 部署 Nginx 示例
#
# 用法：
# 1. 将 frontend/dist 部署到服务器，例如 /opt/polyhermes/frontend/dist
# 2. 将后端 JAR 作为 systemd 服务运行在 127.0.0.1:8000
# 3. 将本文件复制到 /etc/nginx/sites-available/polyhermes
# 4. 创建软链接到 /etc/nginx/sites-enabled/
# 5. 执行 nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;

    root /opt/polyhermes/frontend/dist;
    index index.html;

    access_log /var/log/nginx/polyhermes-access.log;
    error_log /var/log/nginx/polyhermes-error.log;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/api/system/health;
        access_log off;
    }
}
